<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOL Scribe &mdash; Beta</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Login wall -->
  <div id="loginWall" class="login-wall">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-mark">TOL</div>
        <div class="login-brand-name">Scribe</div>
        <span class="login-beta-badge">BETA</span>
      </div>
      <p class="login-subtitle">Clinical prescribing decision support</p>
      <form id="loginForm" class="login-form" autocomplete="off">
        <div class="login-field">
          <label for="loginUser">Username</label>
          <input id="loginUser" type="text" placeholder="Enter username" autocomplete="username" required />
        </div>
        <div class="login-field">
          <label for="loginPass">Password</label>
          <input id="loginPass" type="password" placeholder="Enter password" autocomplete="current-password" required />
        </div>
        <div id="loginError" class="login-error" hidden>Invalid username or password</div>
        <button type="submit" class="login-btn">Sign in</button>
      </form>
      <p class="login-footer">For authorized clinicians only. Not for clinical use.</p>
    </div>
  </div>

  <!-- App container (hidden until authenticated) -->
  <div id="appShell" class="app-shell" hidden>

    <!-- Thin header bar -->
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark">TOL</div>
        <h1>Scribe <span class="beta-badge">BETA</span></h1>
      </div>
      <div class="header-actions">
        <button id="logoutBtn" class="ghost-button ghost-button-secondary" type="button">Sign out</button>
        <button id="helpBtn" class="ghost-button ghost-button-help" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Help
        </button>
      </div>
    </header>

    <!-- Print header (only visible when printing) -->
    <div class="print-header">
      <h1>TOL Scribe &mdash; Prescription Draft</h1>
      <p>Generated on <span id="printDate"></span> &bull; For clinician review only</p>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>

    <!-- 3-column dashboard -->
    <main class="app-dashboard">
      <!-- Left column: Patient -->
      <section class="col-patient" id="colPatient">
        <div class="col-inner" id="patientPanel"></div>
      </section>

      <!-- Center column: Clinical (condition/template + checks) -->
      <section class="col-clinical" id="colClinical">
        <div class="col-inner" id="clinicalPanel"></div>
      </section>

      <!-- Right column: Output -->
      <section class="col-output" id="colOutput">
        <div class="col-inner" id="outputPanel"></div>
        <button id="refineBtn" class="refine-fab" type="button" aria-label="Refine">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 4h18M3 12h12M3 20h6"/></svg>
        </button>
      </section>
    </main>

    <!-- Help modal -->
    <div id="helpModal" class="help-overlay" hidden></div>

    <!-- Refine modal -->
    <div id="refineModal" class="refine-overlay" hidden></div>

    <!-- Demo walkthrough elements -->
    <div id="demoSpotlight" class="demo-spotlight" hidden></div>
    <div id="demoCursor" class="demo-cursor" hidden>
      <svg width="20" height="24" viewBox="0 0 20 24"><path d="M2 1l14 10.5-5.5 1.5-3 5.5z" fill="#1a2332" stroke="#fff" stroke-width="1.2"/></svg>
    </div>
    <div id="demoLabel" class="demo-label" hidden></div>

  </div><!-- /appShell -->

  <script src="app-config.js"></script>
  <script src="app-data.js"></script>
  <script src="app-catalog-a.js"></script>
  <script src="app-catalog-b.js"></script>
  <script src="app-catalog-c.js"></script>
  <script src="app-catalog-d.js"></script>
  <script src="app-catalog-e.js"></script>
  <script src="app-catalog-f.js"></script>
  <script src="app-catalog-g.js"></script>
  <script src="app-catalog-h.js"></script>
  <script src="app-catalog-i.js"></script>
  <script src="app-catalog-j.js"></script>
  <script src="app-catalog-k.js"></script>
  <script src="app-catalog-l.js"></script>
  <script src="app-catalog-peds.js"></script>
  <script src="app-scores.js"></script>
  <script src="app-logic.js"></script>
  <script src="app-ui.js"></script>

  <!-- Auth gate — runs after all scripts are loaded -->
  <script>
  (() => {
    const SESSION_KEY = 'tol_session';
    const SESSION_TTL = 24 * 60 * 60 * 1000; // 24 hours
    const CREDS = { user: 'admin123', pass: 'password123' };

    const wall = document.getElementById('loginWall');
    const shell = document.getElementById('appShell');
    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');
    const userInput = document.getElementById('loginUser');
    const passInput = document.getElementById('loginPass');

    function readSession() {
      try {
        const raw = localStorage.getItem(SESSION_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function clearSession() {
      localStorage.removeItem(SESSION_KEY);
    }

    function persistSession() {
      localStorage.setItem(SESSION_KEY, JSON.stringify({
        user: CREDS.user,
        ts: Date.now(),
      }));
    }

    function isSessionValid() {
      const session = readSession();
      if (!session?.ts) {
        clearSession();
        return false;
      }
      if (Date.now() - session.ts > SESSION_TTL) {
        clearSession();
        return false;
      }
      return true;
    }

    function ensureUiReady() {
      if (window.TOLUI?.init) {
        window.TOLUI.init();
      }
    }

    function setAuthenticated(isAuthenticated, { resetForm = false } = {}) {
      wall.hidden = isAuthenticated;
      shell.hidden = !isAuthenticated;
      wall.inert = isAuthenticated;
      shell.inert = !isAuthenticated;

      errEl.hidden = true;

      if (isAuthenticated) {
        ensureUiReady();
      } else {
        if (resetForm) {
          form.reset();
        }
        userInput.focus();
      }
    }

    // Check session on load
    if (isSessionValid()) {
      persistSession();
      setAuthenticated(true);
    } else {
      setAuthenticated(false);
    }

    // Login form submission
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const user = userInput.value.trim();
      const pass = passInput.value;

      if (user === CREDS.user && pass === CREDS.pass) {
        persistSession();
        setAuthenticated(true);
      } else {
        clearSession();
        errEl.hidden = false;
        passInput.value = '';
        passInput.focus();
      }
    });

    // Logout
    logoutBtn.addEventListener('click', () => {
      clearSession();
      setAuthenticated(false, { resetForm: true });
    });

    window.addEventListener('storage', (e) => {
      if (e.key !== SESSION_KEY) return;
      if (isSessionValid()) {
        setAuthenticated(true);
      } else {
        setAuthenticated(false, { resetForm: true });
      }
    });
  })();
  </script>
</body>
</html>
