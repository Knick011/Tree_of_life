<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tree of Life</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Thin header bar -->
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark">TOL</div>
      <h1>Tree of Life</h1>
    </div>
    <div class="header-actions">
      <button id="helpBtn" class="ghost-button ghost-button-help" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Help
      </button>
    </div>
  </header>

  <!-- Print header (only visible when printing) -->
  <div class="print-header">
    <h1>Tree of Life &mdash; Prescription Draft</h1>
    <p>Generated on <span id="printDate"></span> &bull; For clinician review only</p>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast"></div>

  <!-- 3-column dashboard -->
  <main class="app-dashboard">
    <!-- Left column: Patient -->
    <section class="col-patient" id="colPatient">
      <div class="col-inner" id="patientPanel"></div>
    </section>

    <!-- Center column: Clinical (condition/template + checks) -->
    <section class="col-clinical" id="colClinical">
      <div class="col-inner" id="clinicalPanel"></div>
    </section>

    <!-- Right column: Output -->
    <section class="col-output" id="colOutput">
      <div class="col-inner" id="outputPanel"></div>
      <button id="refineBtn" class="refine-fab" type="button" aria-label="Refine">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 4h18M3 12h12M3 20h6"/></svg>
      </button>
    </section>
  </main>

  <!-- Help modal -->
  <div id="helpModal" class="help-overlay" hidden></div>

  <!-- Refine modal -->
  <div id="refineModal" class="refine-overlay" hidden></div>

  <!-- Demo walkthrough elements -->
  <div id="demoSpotlight" class="demo-spotlight" hidden></div>
  <div id="demoCursor" class="demo-cursor" hidden>
    <svg width="20" height="24" viewBox="0 0 20 24"><path d="M2 1l14 10.5-5.5 1.5-3 5.5z" fill="#1a2332" stroke="#fff" stroke-width="1.2"/></svg>
  </div>
  <div id="demoLabel" class="demo-label" hidden></div>

  <script src="app-config.js"></script>
  <script src="app-data.js"></script>
  <script src="app-catalog-a.js"></script>
  <script src="app-catalog-b.js"></script>
  <script src="app-catalog-c.js"></script>
  <script src="app-catalog-d.js"></script>
  <script src="app-catalog-e.js"></script>
  <script src="app-catalog-f.js"></script>
  <script src="app-catalog-g.js"></script>
  <script src="app-catalog-h.js"></script>
  <script src="app-catalog-i.js"></script>
  <script src="app-catalog-j.js"></script>
  <script src="app-catalog-k.js"></script>
  <script src="app-catalog-l.js"></script>
  <script src="app-scores.js"></script>
  <script src="app-logic.js"></script>
  <script src="app-ui.js"></script>
</body>
</html>
