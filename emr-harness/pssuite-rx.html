<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PS Suite Rx Mock</title>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; margin: 0; background: #eef4f7; color: #17212b; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px 60px; }
    .shell { background: #fff; border-radius: 18px; box-shadow: 0 20px 60px rgba(15,23,42,.09); overflow: hidden; }
    .head { padding: 18px 22px; background: #12314a; color: #fff; }
    .form { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 22px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    .field.search-field { position: relative; }
    label { font-size: 12px; font-weight: 700; color: #334155; text-transform: uppercase; letter-spacing: .04em; }
    input, select, textarea { font: inherit; border: 1px solid #cdd8df; border-radius: 10px; padding: 10px 12px; background: #fff; }
    textarea { min-height: 86px; resize: vertical; }
    .suggestions { position: absolute; left: 0; right: 0; top: calc(100% + 6px); z-index: 10; display: grid; gap: 6px; padding: 8px; border: 1px solid #d7e1e5; border-radius: 12px; background: #fff; box-shadow: 0 12px 30px rgba(15,23,42,.12); }
    .suggestions[hidden] { display: none; }
    .suggestions [role="option"] { padding: 8px 10px; border-radius: 8px; background: #f4f7f8; cursor: pointer; }
    .foot { padding: 0 22px 22px; color: #64748b; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="shell">
      <div class="head">
        <strong>PS Suite Prescribing Mock</strong>
        <div style="margin-top:6px; opacity:.75; font-size:13px">Canadian ambulatory prescribing surface</div>
      </div>
      <div class="form">
        <div class="field search-field">
          <label for="txtDrugName">Medication</label>
          <input id="txtDrugName" placeholder="Medication name" aria-controls="psDrugSuggestions" autocomplete="off" />
          <div id="psDrugSuggestions" class="suggestions" role="listbox" hidden></div>
        </div>
        <div class="field"><label for="txtQuantity">Quantity</label><input id="txtQuantity" name="quantity" placeholder="30 tablets" /></div>
        <div class="field full"><label for="txtSig">Sig</label><textarea id="txtSig" name="sig" placeholder="Take 1 tablet by mouth twice daily"></textarea></div>
        <div class="field"><label for="txtRefills">Refills</label><input id="txtRefills" name="refills" placeholder="1" /></div>
        <div class="field"><label for="txtDuration">Duration</label><input id="txtDuration" name="duration" placeholder="7 days" /></div>
        <div class="field"><label for="selRoute">Route</label><select id="selRoute" name="route"><option value="">Select</option><option value="PO">PO</option><option value="TOP">TOP</option><option value="IM">IM</option></select></div>
        <div class="field"><label for="selFrequency">Frequency</label><select id="selFrequency" name="frequency"><option value="">Select</option><option value="OD">OD</option><option value="BID">BID</option><option value="TID">TID</option><option value="QID">QID</option></select></div>
        <div class="field full"><label for="indication">Indication</label><textarea id="indication" name="indication" placeholder="Reason for treatment"></textarea></div>
        <div class="field full"><label for="pharmacyNote">Notes to pharmacy</label><textarea id="pharmacyNote" name="pharmacyNote" placeholder="Optional pharmacy note"></textarea></div>
      </div>
      <div class="foot">The TOL widget should appear here because this page exposes prescribing fields that match the PS Suite adapter.</div>
    </div>
  </div>

  <script>
    (() => {
      const drugInput = document.getElementById('txtDrugName');
      const suggestions = document.getElementById('psDrugSuggestions');
      let sawTypingEvent = false;
      const drugs = [
        'SULFAMETHOXAZOLE 800MG/TRIMETHOPRIM 160MG TABLET',
        'NITROFURANTOIN 100MG CAPSULE',
        'AMOXICILLIN 500MG CAPSULE',
      ];

      function closeSuggestions() {
        suggestions.hidden = true;
        suggestions.replaceChildren();
      }

      function renderSuggestions(query) {
        const q = String(query || '').trim().toLowerCase();
        const normalizedQuery = q.replace(/[/-]/g, ' ');
        const queryTokens = normalizedQuery.split(/\s+/).filter(Boolean);
        suggestions.replaceChildren();
        if (!q || !sawTypingEvent) {
          closeSuggestions();
          return;
        }

        const matches = drugs.filter((drug) => {
          const normalizedDrug = drug.toLowerCase().replace(/[/-]/g, ' ');
          return normalizedDrug.includes(normalizedQuery) || normalizedDrug.includes(q) || queryTokens.every((token) => normalizedDrug.includes(token));
        });
        if (!matches.length) {
          closeSuggestions();
          return;
        }

        matches.forEach((drug) => {
          const option = document.createElement('div');
          option.setAttribute('role', 'option');
          option.textContent = drug;
          option.addEventListener('click', () => {
            drugInput.value = drug;
            drugInput.dispatchEvent(new Event('input', { bubbles: true }));
            drugInput.dispatchEvent(new Event('change', { bubbles: true }));
            closeSuggestions();
          });
          suggestions.appendChild(option);
        });

        suggestions.hidden = false;
      }

      drugInput.addEventListener('keydown', (event) => {
        if (event.key && event.key.length === 1) sawTypingEvent = true;
      });
      drugInput.addEventListener('input', () => renderSuggestions(drugInput.value));
      drugInput.addEventListener('blur', () => {
        setTimeout(closeSuggestions, 160);
      });
    })();
  </script>
</body>
</html>
